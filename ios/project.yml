name: Dev3

options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

packages:
  Dev3Kit:
    path: Packages/Dev3Kit
  Dev3TerminalKit:
    path: Packages/Dev3TerminalKit
  Dev3UI:
    path: Packages/Dev3UI

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CLANG_ENABLE_MODULES: YES

targets:
  Dev3:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - Resources
    resources:
      - path: App/Resources
    dependencies:
      - package: Dev3Kit
      - package: Dev3TerminalKit
      - package: Dev3UI
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ittaiz.dev3
        PRODUCT_NAME: dev3
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/Dev3.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  Dev3UITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AppUITests
    dependencies:
      - target: Dev3
    configFiles:
      Debug: Config/Tests.xcconfig
      Release: Config/Tests.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ittaiz.dev3.ui-tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Dev3

schemes:
  Dev3:
    build:
      targets:
        Dev3: all
        Dev3UITests:
          - test
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: Dev3UITests
          parallelizable: false
    archive:
      config: Release
