ux_architecture:
  version: 1
  updated_at: "2026-06-29"
  source: "derived_from_repository"
  confidence: "medium"

  product:
    name: "dev-3.0"
    app_type: "full_screen_web_app" # Electrobun desktop shell rendering a React/Vite webview
    primary_users:
      - "Developers orchestrating multiple AI coding agents (Claude Code, Codex, Gemini CLI, Cursor) across tasks"
      - "Power users who live in the terminal and want Kanban-style task tracking on top of git worktrees"
    primary_jobs:
      - "Create a task, get an isolated git worktree + tmux terminal running a preconfigured agent command"
      - "Track task lifecycle across a Kanban board (todo -> in-progress -> review -> completed)"
      - "Run git operations (pull/push/PR/merge/rebase) and dev servers per task without leaving the app"
      - "Manage multiple projects, each a git repo, with per-project setup/dev/cleanup scripts"

  evidence:
    audited_paths:
      - "src/mainview/state.ts"          # screen-based Route union (the navigation model)
      - "src/shared/types.ts"            # Project, Task, TaskStatus, Label, CustomColumn, STATUS_COLORS
      - "src/bun/application-menu.ts"    # native menu = global action surface + action taxonomy
      - "src/mainview/components/"       # all renderer surfaces (board, cards, panels, modals, popovers)
      - "src/mainview/index.css"         # design tokens (CSS custom properties, two themes)
      - "concept.md"                     # product concept + status tracker
      - "AGENTS.md"                      # styling + i18n + token rules (authoritative project policy)
      - "DESIGN.md"                      # design system spec
    key_files:
      - "src/mainview/App.tsx"
      - "src/mainview/components/GlobalHeader.tsx"
      - "src/mainview/components/KanbanBoard.tsx"
      - "src/mainview/components/KanbanColumn.tsx"
      - "src/mainview/components/TaskCard.tsx"
      - "src/mainview/components/TaskInfoPanel.tsx"
      - "src/mainview/components/ProjectSettings.tsx"
      - "src/mainview/components/GlobalSettings.tsx"
      - "tailwind.config.js"
    ignored_paths:
      - node_modules
      - .git
      - dist
      - build
      - views
      - coverage
      - vendor-docs
    limitations:
      - "No URL router: navigation is a screen-based Route union driven by useReducer (src/mainview/state.ts). 'routes' below are screen ids, not paths."
      - "No formal Button variant component exists. Buttons are styled inline with semantic Tailwind token classes. Variant table documents semantic role -> token class, not a prop API."
      - "Many action surfaces are native (Electrobun application menu + context menus) rather than DOM. Action taxonomy spans both."
      - "Selection/bulk-action model: the board has no multi-select; actions are per-task. 'selection_toolbar' rules below are Proposed, not Observed."

  objects:
    project:
      label: "Project"
      plural: "Projects"
      observed: true
      primary_route: "screen:dashboard"      # projects listed on the dashboard
      detail_route: "screen:project"          # Kanban board for one project
      owner: "workspace"
      owns: ["task", "custom_column", "label", "project_settings"]
      common_actions: ["add", "clone", "open_settings", "reorder", "remove", "pull_main"]
      kind:   # observed: Project.kind discriminator
        git: "Repo-backed project; tasks get a git worktree + branch (default when kind absent)."
        virtual: "An 'Operations' board: tasks run an agent + shell in a managed temp dir (or a chosen folder), NO git worktree/branch/diff/PR; review columns hidden. Stored in a separate ~/.dev3.0/virtual-projects.json. One built-in board ships by default and hosts the Quick-shell operation (⇧⌘`)."
      evidence: ["src/shared/types.ts (Project.kind)", "src/mainview/components/ActivityOverview.tsx", "src/mainview/components/AddProjectModal.tsx", "src/bun/data.ts (addVirtualProject)", "decisions/079-virtual-operations-board-identity.md"]
    task:
      label: "Task"
      plural: "Tasks"
      observed: true
      primary_route: "screen:project"          # appears as a card on the board
      detail_route: "screen:task"              # full-screen terminal; also screen:project activeTaskId (split)
      owner: "project"
      owns: ["note", "task_terminal", "worktree", "variant", "attempt"]
      lifecycle_states: ["todo", "in-progress", "user-questions", "review-by-ai", "review-by-user", "review-by-colleague", "completed", "cancelled"]
      common_actions: ["create", "move_status", "rename", "set_overview", "add_note", "spawn_variants", "add_attempts", "duplicate", "delete", "watch", "open_in_ide", "git_actions", "dev_server"]
      evidence: ["src/shared/types.ts (Task, TaskStatus, ALL_STATUSES)", "src/mainview/components/TaskCard.tsx", "src/mainview/components/TaskInfoPanel.tsx", "src/bun/application-menu.ts"]
    label:
      label: "Label"
      plural: "Labels"
      observed: true
      owner: "project"
      common_actions: ["create", "rename", "recolor", "assign", "filter_by"]
      evidence: ["src/shared/types.ts (Label, LABEL_COLORS)", "src/mainview/components/LabelPicker.tsx", "src/mainview/components/LabelFilterBar.tsx", "src/cli/commands/label.ts"]
    custom_column:
      label: "Custom Column"
      plural: "Custom Columns"
      observed: true
      owner: "project"
      common_actions: ["create", "rename", "recolor", "set_llm_instruction", "attach_agent_config"]
      evidence: ["src/shared/types.ts (CustomColumn)", "src/mainview/components/KanbanBoard.tsx"]
    note:
      label: "Note"
      plural: "Notes"
      observed: true
      owner: "task"
      common_actions: ["add", "edit", "delete"]
      evidence: ["src/shared/types.ts (TaskNote)", "src/mainview/components/NoteItem.tsx", "src/mainview/components/task-info-panel/TaskNotes.tsx", "src/cli/commands/note.ts"]

  navigation:
    model: "screen_router" # observed: useReducer Route union, not URL paths
    global_nav:
      purpose: "Move between the few stable destinations of the app."
      observed_destinations:
        - "dashboard"        # all projects
        - "project"          # Kanban board (the home of daily work)
        - "task"             # full-screen task terminal
        - "project-terminal" # project-level terminal
        - "settings"         # global settings
        - "project-settings" # per-project config (tabs: global | project | worktree)
        - "changelog"        # what's new
        - "stats"            # productivity stats dashboard (Velocity Cockpit)
        - "gauge-demo"       # debug/dev surface
        - "viewport-lab"     # debug/dev surface
      mechanism: "GlobalHeader breadcrumbs + back/forward history (HISTORY_LIMIT=15) + native application menu 'View'"
      allowed: ["destination", "workspace", "major_product_area"]
      forbidden: ["one_off_action", "filter", "temporary_state", "object_specific_control"]
      max_top_level_items: 7   # proposed budget; debug screens (gauge-demo, viewport-lab) should stay menu-only
      max_depth: 2
      status: "observed"
      evidence: ["src/mainview/state.ts (Route)", "src/mainview/components/GlobalHeader.tsx", "src/bun/application-menu.ts"]
    breadcrumbs:
      purpose: "Show location: Dashboard > Project > Task. Project chevron opens a project switcher dropdown."
      rules:
        - "Text click navigates; chevron toggles the project-switcher dropdown."
        - "Breadcrumbs show place, not bulk actions."
      status: "observed"
      evidence: ["src/mainview/components/GlobalHeader.tsx (BreadcrumbSegment, project switcher)"]
    tabs:
      observed_in: ["project-settings (global | project | worktree)"]
      max_visible_tabs: 6
      status: "observed"
    command_palette:
      purpose: "Keyboard-summoned palette with two modes (see surfaces.command_palette). Navigation (Cmd/Ctrl+K) complements index jumps (Cmd+1..9) and the breadcrumb dropdown; actions (Cmd/Ctrl+Shift+P) complement the native menu when you'd rather type than hunt."
      mechanism: "Cmd/Ctrl+K = navigation (fuzzy-jump to a project, Enter navigates). Cmd/Ctrl+Shift+P = actions (fuzzy-match a command label, Enter runs it via handleMenuAction). Both fuzzy via utils/fuzzyMatch.ts on the shared PaletteShell."
      allowed: ["destination", "object_jump", "command_runner"]
      forbidden: ["destructive_action", "durable_state_without_friction"]
      status: "observed"
      evidence: ["src/mainview/components/ProjectQuickSwitchModal.tsx", "src/mainview/components/CommandPaletteModal.tsx", "src/mainview/App.tsx (Cmd+K + Cmd+Shift+P)"]

  surfaces:
    global_header:
      purpose: "Breadcrumb location, project switcher, and app-level destinations/utilities."
      allowed: ["history_nav", "breadcrumb", "destination", "project_switcher", "changelog", "settings_entry", "tmux_session_manager", "prevent_sleep_toggle"]
      forbidden: ["task_scoped_action", "dense_filters", "destructive_primary"]
      note: "history_nav = back/forward arrows pinned at the far left of the breadcrumb row (browser convention), driven by the route-history stack in state.ts. Also bound to Cmd+[/Cmd+] and mouse side buttons. Buttons are neutral/ghost icon-only and disable when canGoBack/canGoForward is false."
      evidence: ["src/mainview/components/GlobalHeader.tsx", "src/mainview/state.ts (routeHistory/goBack/goForward)", "src/mainview/App.tsx (Cmd+[/], mouseup buttons 3/4)"]
    application_menu:
      purpose: "Native macOS/Linux menu bar; canonical home for the full action taxonomy (File / Edit / Task / Project / View / Debug)."
      allowed: ["destination", "task_action", "project_action", "git_action", "dev_server_action", "destructive", "expert_shortcut"]
      forbidden: []
      note: "Native menu is the overflow/expert surface. Frequent actions are mirrored into DOM toolbars. Definition lives in src/shared/application-menu.ts (relocated from src/bun) so the browser menu bar can share it."
      evidence: ["src/shared/application-menu.ts", "src/bun/menu-actions.ts", "src/mainview/menuRouter.ts"]
    app_menu_bar:
      purpose: "Browser / Remote Access stand-in for the native menu bar. First row of the window (above global_header); renders the same buildApplicationMenu(context) tree as React."
      mode: "browser_only"  # mounted only when isElectrobun === false; never in the Electrobun desktop shell
      allowed: ["destination", "task_action", "project_action", "dev_server_action", "expert_shortcut"]
      forbidden: ["native_role_item", "roadmap_item", "bun_only_action", "task_scoped_action_in_header"]
      filtering: "Drop role items (clipboard/window/quit — browser owns them), actions not in menuRouter.BROWSER_HANDLED_ACTIONS (bun-only: new-window/check-for-updates/devtools/zoom/open-logs/remote-QR), and NOT_YET_IMPLEMENTED roadmap items. Context-gated items render greyed."
      dispatch: "handleMenuAction (same router as native menu + command palette)"
      labels: "English, sourced from the shared menu definition — parity with the native menu (which is not i18n'd); documented i18n exception."
      responsive: "Collapses to a single ☰ button below 640px (mobile remote)."
      budget:
        max_top_level_menus: 7   # mirrors the native top-levels minus native-only role menus (Edit/Window)
        dropdown_length: "unbounded — it is the overflow/expert surface"
      status: "observed"
      evidence: ["src/mainview/components/AppMenuBar.tsx", "src/shared/application-menu.ts", "src/mainview/menuRouter.ts (BROWSER_HANDLED_ACTIONS)", "src/mainview/App.tsx (browser-only mount)"]
    kanban_board:
      purpose: "Primary work surface: columns by status, task cards, drag-to-move, per-column add."
      allowed: ["object_card", "create_in_column", "drag_move", "column_config", "label_filter"]
      forbidden: ["durable_global_configuration"]
      evidence: ["src/mainview/components/KanbanBoard.tsx", "src/mainview/components/KanbanColumn.tsx", "src/mainview/components/LabelFilterBar.tsx"]
    task_card:
      purpose: "Compact object summary on the board with the most relevant per-task affordances."
      allowed: ["status_dot", "label_chip", "variant_dots", "open_action", "context_menu", "git_status_badge"]
      forbidden: ["full_settings", "global_destination"]
      visible_budget:
        max_inline_actions: 2
        overflow_to: "context_menu"
      status: "inferred" # card is dense; treat budget as a guardrail
      evidence: ["src/mainview/components/TaskCard.tsx (32.9K - large, watch density)"]
    task_info_panel:
      purpose: "Inspector for the active task: git actions, dev server, scripts, notes, tmux controls, open-in."
      allowed: ["object_action", "git_action", "dev_server_action", "metadata", "notes", "secondary_edit"]
      forbidden: ["global_destination", "cross_project_action"]
      note: "This panel is the densest surface (34K). It is the main complexity-budget risk in the app."
      evidence: ["src/mainview/components/TaskInfoPanel.tsx", "src/mainview/components/task-info-panel/*"]
      bar_model:
        layout: "2x2"  # two rows; each row split into left|right by a flex-1 spacer
        rationale: "Wide desktop width is used instead of stacking more rows; the panel has a hard height budget (MAX_RATIO=0.33). One bar = one action domain. Panel chrome is not a bar."
        per_bar_visible_budget: 4
        overflow_rule: "If a domain bar exceeds 4 visible, promote it to its own dedicated row before widening past budget."
        bars:
          context:
            position: "row1.left"
            domain: "task identity & lifecycle"
            contents: ["watch_toggle", "status_dropdown", "diff_summary_badge", "include_tests_toggle", "label_strip"]
            label_overflow: "Show up to MAX_INLINE_LABELS (4) chips inline, then a +k chip (hover lists the rest). Full list also in expanded metadata grid."
          session_agent:
            position: "row1.right"
            domain: "drive the session & agents"
            contents: ["spawn_agent", "bug_hunters", "tmux_controls"]
          git:
            position: "row2.left"
            domain: "branch & PR"
            contents: ["branch_status", "show_diff", "refresh", "copy_worktree_path", "open_pr"]
          runtime:
            position: "row2.right"
            domain: "project runtime outputs + access to them"
            contents: ["open_in", "scripts", "dev_server"]
            note: "open-in lives here (opens the produced worktree) and keeps the bar balanced at 3 controls. Ports/resource usage render as detail in the expanded body, not in the bar."
        chrome:
          not_a_bar: true
          position: "row1 far-right edge"
          contents: ["collapse_expand", "fullscreen_toggle", "worktree_settings_gear"]
        rows:
          row1: "Drive — what the task is + how I control its session"
          row2: "Outputs — what the work produces (branch/PR + running server/ports)"
    diff_review_viewer:
      purpose: "Full-screen read + inline-review of a task's diff; export comments as an XML review prompt for the agent."
      reached_from: ["inspector:show_diff", "inspector:diff_summary_badge"]
      allowed: ["view_mode_toggle", "diff_mode_toggle", "file_tree_nav", "in_diff_search", "mark_read", "copy_file_path", "inline_comment", "review_export", "review_copy", "review_reset"]
      forbidden: ["task_lifecycle_action", "git_mutation", "global_destination"]
      layout: "left Files aside (collapsible, 22rem: Review-export card + Files card) + right diff stream"
      review_export_card:
        note: "The one budgeted action cluster on this surface. One primary only."
        controls:
          copy_review:   { role: "primary",     token: "bg-accent (solid), success-tint on copied", visible: "always; disabled at 0 comments" }
          reset_review:  { role: "destructive",  token: "ghost-danger: text-danger + border-danger/30 + hover:bg-danger/10", visible: "only when >=1 comment; confirm() required" }
          comment_count: { role: "status",       token: "bg-raised mono badge" }
          comment_item:  { role: "link",         token: "bg-raised/65, accent on hover; scroll-to-comment" }
      persistence:
        store: "localStorage, keyed per task (dev3-inline-diff-review-v1:<taskId>)"
        survives: ["unmount", "diff reload", "app restart"]
        ttl: "3 days from review creation, then auto-expires on next read"
        gc: "Global sweep on every diff-viewer mount walks all review keys and drops expired/corrupt entries, so reviews for tasks that are never reopened (or deleted) cannot accumulate."
        cleared_by: ["reset_review button", "TTL expiry", "global sweep on diff open"]
        rule: "Inline review is a short-lived safety net, not clipboard-only and not permanent. Clipboard is transport, not store. Leaving the surface does NOT discard the review — no discard-on-close guard."
      evidence: ["src/mainview/components/TaskDiffViewer.tsx", "src/mainview/components/task-inline-diff.ts", "src/mainview/components/TaskDiffViewer.css"]
    modal:
      purpose: "Focused create/confirm flows."
      allowed: ["create_flow", "confirm", "destructive_confirm", "focused_config"]
      forbidden: ["primary_navigation", "persistent_dashboard"]
      observed: ["CreateTaskModal", "AddProjectModal", "TaskDetailModal", "LaunchVariantsModal", "SpawnAgentModal", "GitPullErrorModal", "TmuxCheatSheetModal", "FolderPickerModal"]
      evidence: ["src/mainview/components/*Modal.tsx"]
    popover:
      purpose: "Lightweight contextual preview/hint anchored to an element."
      allowed: ["preview", "hint", "quick_action", "remediation"]
      forbidden: ["multi_step_flow", "primary_destination"]
      observed: ["SiblingPopover", "TerminalPreviewPopover", "StuckPreparationPopover"]
      evidence: ["src/mainview/components/*Popover.tsx"]
    context_menu:
      purpose: "Object-scoped actions on right-click (task card, terminal, sidebar)."
      allowed: ["object_action", "open_in", "destructive"]
      forbidden: ["global_destination"]
      evidence: ["src/mainview/components/OpenInMenu.tsx", "concept/changelog: open-in-context-menu, terminal context menu"]
    settings:
      purpose: "Durable configuration. GlobalSettings (app-wide) and ProjectSettings (per-project scripts, columns, labels, gh account)."
      allowed: ["configuration", "preference", "integration", "permission", "scripts"]
      forbidden: ["daily_operational_action"]
      evidence: ["src/mainview/components/GlobalSettings.tsx", "src/mainview/components/ProjectSettings.tsx (59.9K)", "src/mainview/components/global-settings/*"]
    sidebar:
      purpose: "Active tasks list / quick jump across running agents, with global-scope toggle."
      allowed: ["destination", "task_jump", "terminal_hover_preview", "search"]
      forbidden: ["durable_configuration"]
      evidence: ["src/mainview/components/ActiveTasksSidebar.tsx", "src/mainview/components/ActiveTasksStrip.tsx"]
    stats_dashboard:
      purpose: "Read-only full-screen 'Velocity Cockpit' proving how much the user ships: hero speedometer gauges (tasks shipped, lines changed, velocity, completion rate, streak), SVG bar/area charts over time, a per-project gauge wall, and a counters strip — all re-scoped by a Day/Week/Month/All time range."
      feature_class: ["destination", "data_visualization"]
      reached_from: ["dashboard:entry_card", "application_menu.View (Show Productivity Stats)", "command_palette ⇧⌘P (view-stats)"]
      allowed: ["data_visualization", "time_range_switch", "navigation (per-project card → board)"]
      forbidden: ["mutation", "task_lifecycle_action", "durable_configuration", "global_header_button"]
      data: "Local only. Completed-task counts/streaks from movedAt (full history); LOC forward-only via Task.completedDiffStats (captured at completion) + live diff for active tasks. Aggregated client-side by utils/productivityStats.ts over the getProductivityStats RPC."
      instrumentation: "First-class consumer of new features: any feature producing a countable, motivational signal should emit it into the stats pipeline at build time and surface a read-only viz here when it motivates — within the honesty/complexity budget. Governed by placement_rules.instrument-and-surface-countable-metrics + PRODUCT_UX_BIBLE §1.1."
      tokens: "Gauge reused verbatim (self-contained palette, accepted exception); new charts use semantic tokens (accent/success/danger, bg-raised, border-edge, text-fg-*)."
      evidence: ["src/mainview/components/ProductivityStatsView.tsx", "src/mainview/components/stats/*", "src/mainview/utils/productivityStats.ts", "src/bun/rpc-handlers/productivity-stats.ts", "decisions/084-productivity-stats-loc-capture.md", "docs/ux/feature-plans/productivity-stats-dashboard.md", "UX_DECISIONS 2026-06-28"]
    toast:
      purpose: "Transient operation feedback (errors)."
      allowed: ["status_message", "error"]
      forbidden: ["persistent_action", "primary_action"]
      evidence: ["src/mainview/components/ErrorToast.tsx"]
    keyboard_shortcuts_reference:
      purpose: "Read-only keymap reference overlay (Modal). ONE component with two tabs — App (renders from the keymap.ts registry) and Terminal (tmux) (folds in the tmux cheat sheet). onboarding/help + expert_shortcut content, same shell as TmuxCheatSheetModal."
      allowed: ["shortcut_reference", "tab_switch"]
      forbidden: ["command_runner", "object_action", "durable_configuration", "primary_navigation", "toolbar_button"]
      source_of_truth: "src/mainview/keymap.ts — every app-level shortcut declared as data (id, per-platform keys, descKey, category). DOCUMENTS the keymap; does NOT drive dispatch (App.tsx if-else stays the executor; a vitest test guards drift). Same data renders the README table + website (docs/index.html)."
      entry_points: ["application_menu.Help (Keyboard Shortcuts — wires the currently-dead help-keyboard-shortcuts action; Tmux Cheat Sheet opens the Terminal tab)", "keyboard: Cmd+/ (Ctrl+/ on Linux), App.tsx capture-phase handler, label shows (⌘/)", "command_palette ⇧⌘P via commands.ts entry"]
      rationale: "No toolbar/header button (toolbar-button-creep is the #1 anti-pattern); not a nav destination (ephemeral reference ≠ a place; nav budget ≤7). One modal with tabs per the user's 'единый вид'; tab split keeps ~40 tmux bindings from drowning ~25 app shortcuts. Cmd+/ over bare ? because the live terminal must receive a bare ?."
      observed: ["KeyboardShortcutsModal (planned)", "keymap.ts (planned)", "TmuxCheatSheetModal"]
      evidence: ["docs/ux/feature-plans/keyboard-shortcuts-registry.md", "UX_DECISIONS 2026-06-19", "src/bun/application-menu.ts (helpKeyboardShortcuts)", "src/mainview/components/TmuxCheatSheetModal.tsx"]
    task_switcher:
      purpose: "Transient keyboard-summoned HUD overlay for hold-cycle jumping between active tasks (Option+Tab project / Option+Shift+Tab global). A presentation of the sidebar's task_jump action, not a command palette."
      allowed: ["task_jump", "terminal_preview"]
      forbidden: ["command_runner", "object_action", "durable_configuration", "primary_navigation"]
      observed: ["TaskSwitcherOverlay (planned)"]
      evidence: ["docs/ux/feature-plans/option-tab-task-switcher.md", "UX_DECISIONS 2026-06-15"]
    command_palette:
      purpose: "Transient keyboard-summoned overlay built on the shared PaletteShell (portal, fuzzy input, keyboard nav). TWO sibling modes, kept cleanly separated by intent (the navigation-vs-action question is now resolved as two-surfaces-one-shell, not one-palette-with-modes). Distinct from task_switcher, which is hold-cycle (Option+Tab) over only the active tasks — the palette is type-to-search."
      modes:
        navigation:
          hotkey: "Cmd/Ctrl+K"
          purpose: "Type-to-find navigation. Today: fuzzy-jump to a project by name; Enter navigates to the best match."
          allowed: ["destination", "fuzzy_search", "object_jump"]
          forbidden: ["command_runner", "object_action", "durable_configuration", "dense_filters"]
          component: "ProjectQuickSwitchModal"
        action:
          hotkey: "Cmd/Ctrl+Shift+P"
          purpose: "Type-to-run commands (VSCode convention). Fuzzy-match a command label, Enter runs it via the shared handleMenuAction router — the palette is a DOM mirror of the native menu, NOT a second command runner. Only commands runnable in the current route context are listed (scope: always | project | task)."
          allowed: ["command_runner", "object_action", "navigation", "configuration"]
          forbidden: ["destructive_action", "modal_or_inline_flow", "dense_filters"]
          forbidden_rationale: "Destructive (task delete/cancel/complete) needs friction, not a fuzzy-Enter — stays on inspector/context-menu/confirm. Modal/inline flows (rename, set-overview, add-note, spawn-variants, duplicate) keep living on their own surfaces."
          component: "CommandPaletteModal"
      note: "No toolbar/breadcrumb button (sidesteps toolbar-button-creep), but BOTH palettes are surfaced at the top of the native View menu (Go to Project… ⌘K / Command Palette… ⇧⌘P) for discoverability — the native menu is the canonical action surface, not DOM chrome. Menu items open (not toggle) via menuRouter; no native accelerator (chords can't be bound — decision 044 — and the palettes toggle, so App.tsx keydown stays the sole shortcut owner). NOT Cmd+T: that is the universal new-tab key and the live terminal underneath (ghostty/tmux) intercepts it. The action palette dispatching through handleMenuAction also fixed several native-menu items that were previously no-op in the renderer."
      future:
        - "Cmd+K grows to fuzzy-search tasks as well as projects, reusing utils/fuzzyMatch.ts (the single matcher for short UI entities; BM25 in shared/conversation-search-core.ts stays for long transcripts)."
        - "Action palette can grow to cover more menu actions by adding a registry entry in commands.ts AND a handleMenuAction case — destructive/modal flows still excluded by policy."
      observed: ["ProjectQuickSwitchModal", "CommandPaletteModal", "PaletteShell", "commands.ts", "utils/fuzzyMatch.ts"]
      evidence: ["src/mainview/components/PaletteShell.tsx", "src/mainview/components/ProjectQuickSwitchModal.tsx", "src/mainview/components/CommandPaletteModal.tsx", "src/mainview/commands.ts", "src/mainview/menuRouter.ts", "src/mainview/App.tsx (Cmd+K + Cmd+Shift+P handlers)", "UX_DECISIONS 2026-06-18"]

  action_types:
    primary_action:
      definition: "The main safe action for the current screen/flow (e.g. Create Task, Add Project)."
      placement: ["modal.footer", "page_header.primary"]
      max_visible_per_screen: 1
      token_role: "primary (bg-accent)"
    object_action:
      definition: "Acts on one task/project (rename, set overview, watch, duplicate, open-in)."
      placement: ["task_info_panel", "task_card.context_menu", "application_menu.Task"]
    git_action:
      definition: "Branch/PR operations on a task worktree (pull, push, create PR, merge, rebase, show branch status)."
      placement: ["task_info_panel (TaskGitActions)", "application_menu.Project", "kanban (git pull button)"]
      note: "Git ops run in a visible terminal (decision 008). Keep frequent ones inline, rare ones in menu."
    dev_server_action:
      definition: "Start/stop/restart/status of a project's dev server."
      placement: ["task_info_panel (TaskDevServer)", "application_menu.Project.DevServer"]
      token_role: "neutral; restart/stop carry risk styling where data loss possible"
    lifecycle_action:
      definition: "Move task across statuses (mostly hook-driven), complete, cancel."
      placement: ["kanban drag", "status dropdown", "application_menu.Task.MoveToStatus"]
    configuration:
      definition: "Durable change to project/app behavior (scripts, columns, labels, theme, locale, gh account)."
      placement: ["settings", "project_settings"]
    destructive:
      definition: "Delete task, remove project, cancel, reset terminal, hard refresh."
      placement: ["overflow", "context_menu", "confirmation_dialog", "danger_zone"]
      token_role: "destructive (text-danger / bg-danger)"
      requires_confirmation: true
    expert_shortcut:
      definition: "Rare known action (debug screens, tmux cheat sheet, gauge/viewport lab, zoom)."
      placement: ["application_menu.View", "application_menu.Debug", "keyboard_shortcut"]

  design_tokens:
    note: "Tokens are CSS custom properties in src/mainview/index.css, mapped to Tailwind in tailwind.config.js. NEVER hardcode hex/rgb in components (AGENTS.md). STATUS_COLORS in types.ts are the documented exception (inline status hex)."
    button_roles:
      primary:
        token_class: "bg-accent / hover:bg-accent-hover (text-white)"
        use_for: "One main safe action for the current screen (Create, Save, Confirm)."
        max_per_screen: 1
        evidence: ["src/mainview/components/TaskDetailModal.tsx", "src/mainview/components/CreateTaskModal.tsx"]
      secondary:
        token_class: "bg-raised / bg-elevated + border-edge, or text-accent bg-accent/10"
        use_for: "Visible supporting action with lower priority than primary."
      ghost:
        token_class: "transparent + hover:bg-raised-hover / hover:bg-elevated-hover"
        use_for: "Low-emphasis icon/utility buttons in dense toolbars."
      destructive:
        token_class: "text-danger / hover:bg-danger/10..15 / border-danger/30 (bg-danger for solid)"
        use_for: "Delete, remove, cancel, reset. Never use bg-accent primary styling for these."
        evidence: ["src/mainview/components/TaskInfoPanel.tsx:585", "src/mainview/components/TaskDetailModal.tsx:317"]
      link:
        token_class: "text-accent hover:text-accent-hover (no background)"
        use_for: "Inline navigation / open-in actions."
    semantic_state_tokens:
      success:
        token: "--success / --success-hover (green)"
        use_for: "Completed, healthy, active dev server."
      warning:
        token: "--warning (yellow)"
        use_for: "Needs attention, degraded, your-review."
      danger:
        token: "--danger (red)"
        use_for: "Failed, destructive risk, cancelled."
      awake:
        token: "--awake / --awake-hover (amber, defined in both themes)"
        use_for: "Sleep-prevention active (header coffee toggle). A distinct always-on affordance, not a warning. Added 2026-06-03."
      info:
        token: "NONE (gap)"
        use_for: "No dedicated info token; accent (blue) is reused for informational emphasis."
        status: "proposed" # consider adding --info if informational state needs to differ from accent
    surface_tokens:
      levels: ["bg-base", "bg-raised", "bg-elevated", "bg-overlay"]
      hover: ["bg-raised-hover", "bg-elevated-hover"]
      text: ["text-fg", "text-fg-2", "text-fg-3", "text-fg-muted"]
      border: ["border-edge", "border-edge-active"]
    status_colors:
      note: "Per-status hex (STATUS_COLORS / STATUS_COLORS_LIGHT) used in inline styles for column headers, card borders, dots. Documented exception to the no-hardcoded-color rule."
      values_dark: ["todo:#70e3ff", "in-progress:#afbaff", "user-questions:#ffa353", "review-by-ai:#a0aec0", "review-by-user:#ffe55f", "review-by-colleague:#c4a5ff", "completed:#3cf3b0", "cancelled:#ff8282"]

  screen_patterns:
    list_screen:
      example: "dashboard (projects), kanban board (tasks)"
      header: "GlobalHeader breadcrumb + add/create entry"
      filter: "label filter bar (board); task search (sidebar/dashboard)"
      item_actions: "context menu on card; open navigates to task"
      empty_state: "compact empty Kanban columns (decision 047); empty config fallthrough (decision 020)"
    detail_screen:
      example: "task (full-screen terminal) / split project+task"
      header: "two-row task info header"
      inspector: "TaskInfoPanel (git, dev server, scripts, notes, tmux, open-in)"
      actions: "object + git + dev-server actions, scoped to the task"
    settings_screen:
      example: "GlobalSettings, ProjectSettings"
      grouping: "sections (Agent, Appearance, Behavior, Workspace, DeveloperTools)"
      save_apply: "updateProjectSettings / settings RPC handlers"
      danger_zone: "remove project / destructive cleanup behind confirmation"

  complexity_budgets:
    global_nav:
      max_top_level_items: 7
      max_depth: 2
    page_header:
      max_primary_actions: 1
      max_secondary_actions: 2
    task_card:
      max_inline_actions: 2
      overflow_after: 2     # push extra affordances into the context menu
    task_info_panel:
      layout: "2x2 bar model (see surfaces.task_info_panel.bar_model)"
      per_bar_visible_budget: 4
      note: "Highest-risk surface. New controls go into exactly one of the 4 domain bars; overflow after 4 ⇒ promote that domain to its own row."
    toolbar:
      max_visible_actions: 4
      overflow_after: 4     # the app has a documented history of always-visible git/tmux button creep
    tabs:
      max_visible_tabs: 6

  placement_rules:
    - id: "navigation-destinations-only"
      when: { feature_class: "destination" }
      place_in: ["global_header", "application_menu.View", "sidebar"]
      reject: ["task_card", "modal", "toolbar"]
      status: "observed"
      rationale: "Navigation should contain stable places, not one-off commands."
    - id: "task-scoped-actions-in-inspector-or-menu"
      when: { feature_class: "object_action", scope: "single_task" }
      place_in: ["task_info_panel", "task_card.context_menu", "application_menu.Task"]
      reject: ["global_header", "dashboard"]
      status: "observed"
      rationale: "Task actions belong to the task surface, not the app chrome."
    - id: "git-frequent-inline-rare-in-menu"
      when: { feature_class: "git_action" }
      place_in: ["task_info_panel.TaskGitActions (frequent)", "application_menu.Project (rare)"]
      reject: ["global_header", "task_card_inline (beyond a single status badge)"]
      status: "inferred"
      rationale: "Git surface is already dense; protect it from button creep."
    - id: "configuration-in-settings"
      when: { feature_class: "configuration" }
      place_in: ["global_settings", "project_settings"]
      reject: ["kanban_board", "task_info_panel", "toolbar"]
      status: "observed"
      rationale: "Durable behavior changes live in settings, not in operational surfaces."
    - id: "destructive-needs-friction"
      when: { feature_class: "destructive" }
      place_in: ["context_menu", "confirmation_dialog", "danger_zone", "overflow"]
      reject: ["primary_button", "global_header"]
      token_role: "destructive"
      status: "observed"
      rationale: "Delete/cancel/reset require confirmation and destructive styling (text-danger/bg-danger)."
    - id: "debug-screens-menu-only"
      when: { feature_class: "expert_shortcut", example: "gauge-demo / viewport-lab" }
      place_in: ["application_menu.Debug"]
      reject: ["global_header", "dashboard", "sidebar"]
      status: "observed"
      rationale: "Dev/debug surfaces must not appear in user-facing navigation."
    - id: "instrument-and-surface-countable-metrics"
      when: { feature_class: "data_visualization", trait: "countable_motivational_signal" }
      place_in: ["emit into stats pipeline first (src/bun/rpc-handlers/productivity-stats.ts + src/mainview/utils/productivityStats.ts)", "stats_dashboard (visualization, read-only)"]
      reject: ["controls_or_config_on_cockpit", "new_top_level_screen_per_metric", "global_header_counter", "diagnostic_only_metric_on_cockpit"]
      status: "proposed"
      rationale: "The Velocity Cockpit is the product's motivation engine. New features that produce a countable, repeatable signal should emit it into the stats pipeline at BUILD time (so the data exists even before it is charted) and surface a visualization on the read-only cockpit WHEN motivational — within the complexity + honesty budget (prefer one strong signal; forward-only 'tracking since', never fake history; numbers must be true). Diagnostic-only metrics keep the data but stay off the cockpit. See PRODUCT_UX_BIBLE §1.1 + UX_DECISIONS 2026-06-29."

  responsive:
    status: "partial" # board_carousel implemented; full mobile doctrine proposed — see bible §12 + feature-plans/narrow-viewport-doctrine.md
    idea_credit: "Ittai Zeidman (carousel reference)"
    principle: "On a narrow viewport show exactly ONE sibling at a time and move between siblings by swipe + a visible pager. Columns, tasks-in-column, terminal panes, active tasks, settings sections, diff files all collapse to this one-at-a-time idiom. A responsive view-mode of existing screens — never a new destination, route, or 'mobile mode' setting."
    no_new_nav: "Narrow layouts are responsive view-modes of existing screens. They MUST NOT add a destination, nav item, route, or be entered via a setting. Layout follows the viewport automatically."
    breakpoints:
      narrow_mobile:
        rule: "viewport width < 768px"
        signal: "useNarrowViewport(768) — matchMedia, reactive (CAROUSEL_MAX_WIDTH). THIS is the layout gate."
        aligns_with: "Tailwind md"
        covers: ["phone via dev3 remote", "narrowed desktop browser window", "hypothetical electrobun-mobile"]
      compact:
        rule: "viewport width < 1600px"
        signal: "useCompact() (COMPACT_MAX_WIDTH) — reactive"
        governs: "dense-DESKTOP label hiding + header overflow kebab. NOT mobile. A wide-but-not-huge desktop is compact, not narrow."
      device_class:
        rule: "screen.width < 1024px"
        signal: "useMobile() — mount-once, NOT reactive"
        governs: "ONLY the <meta viewport> decision in useViewport(). NOT a layout gate."
      reconciliation: "Gate LAYOUT on useNarrowViewport (reactive). Use useMobile ONLY for viewport-meta. NEVER gate layout on isElectrobun (transport != width). Earlier 'sub-1024 / useMobile' wording was wrong; shipped gate is 768 / useNarrowViewport."
    gesture_law:
      scroll_body: "board columns / lists / settings sections — one sibling = 100vw via CSS scroll-snap, body scrolls the OTHER axis. FULL-SURFACE SWIPE ALLOWED (axis unambiguous; delegate to browser)."
      live_content: "terminal pane / diff stream / any canvas/TUI — one element + position indicator (dots). FULL-SURFACE SWIPE ALLOWED BUT AXIS-ARBITRATED: claim a gesture only once clearly horizontal (capture-phase preventDefault+stopPropagation, cancel nascent selection); vertical drags + taps fall through to the content. scroll-snap can't do this (no sibling slides) -> manual gesture. (Revised 2026-06-29; was 'swipe forbidden, pager only' — bottom pager bar collided with the mobile keyboard. See decision 089.)"
      always: "every swipe has a button + keyboard equivalent (chevrons/dots/Arrow Left-Right); swipe is never the only way. Focus follows the active sibling; aria-live announces it. prefers-reduced-motion snaps instantly — honour EVERYWHERE (today only MobileBoardCarousel does)."
    surface_adaptation: # every §5 surface gets a narrow form
      kanban_board: { narrow: "column carousel (one column/screen, swipe; vertical task scroll; collapsed cols excluded, empty kept)", status: observed, evidence: "MobileBoardCarousel.tsx, KanbanBoard.tsx useNarrowViewport(768), KanbanColumn fullWidth" }
      task_move_drag: { narrow: "drag impossible -> 'Move to <status>' bottom action sheet (long-press) on existing status path; completion reuses confirmTaskCompletion", status: proposed }
      board_filters: { narrow: "bottom sheet behind a header funnel button (LabelFilterBar + search)", status: proposed }
      terminal_panes: { narrow: "pane carousel — one zoomed pane + axis-arbitrated horizontal swipe over the terminal + a slim non-overlapping top dots strip + Arrow keys; keep-zoom via tmuxPaneNavigate (select-pane then idempotent resize-pane -Z)", status: observed, evidence: "MobilePaneCarousel.tsx, TaskTerminal.tsx, tmux-pty.ts tmuxPaneNavigate, decision 089" }
      terminal_windows: { narrow: "window switcher — a slim 'prev / named dropdown / next' bar ABOVE the pane bar (window = outer workspace, pane = inner split); buttons + dropdown + Arrow-while-focused, NO swipe (terminal swipe is the pane carousel's); renders only when window count > 1; via tmuxWindowNavigate (list-windows + select-window :+/:-)", status: observed, evidence: "MobileWindowCarousel.tsx, TaskTerminal.tsx, tmux-pty.ts tmuxWindowNavigate, decision 093" }
      active_tasks: { narrow: "ActiveTasksStrip (horizontal task carousel) — already used in ProjectView isBrowserMode; SplitLayout/ActiveTasksSidebar never shown <768 (SplitLayout breaks ~<600px)", status: observed, evidence: "ProjectView.tsx isBrowserMode branch, ActiveTasksStrip, SplitLayout.tsx" }
      task_inspector: { narrow: "2x2 bar grid cannot fit -> one summary bar + 'task actions' bottom sheet (bars become sheet sections); metadata grid already reflows", status: proposed, evidence: "TaskInfoPanel.tsx (uses useCompact)" }
      diff_viewer: { narrow: "files-aside (22rem) -> bottom-sheet file picker; diff stream owns screen (live-content: explicit nav, no full-surface swipe)", status: proposed, evidence: "TaskDiffViewer.tsx w-[22rem] aside" }
      modal: { narrow: "full-bleed sheet: max-w-[calc(100vw-2rem)] max-h-[calc(100dvh-2rem)], or BottomSheet for action-style modals", status: proposed, evidence: "TaskDetailModal 35rem, AddProjectModal 32.5rem, confirm() 26rem — all fixed-width" }
      context_menu: { narrow: "bottom action sheet (long-press trigger)", status: proposed }
      settings: { narrow: "tabs -> one section at a time (carousel / <select> / accordion); no horizontal tab overflow", status: proposed, evidence: "GlobalSettings.tsx, ProjectSettings.tsx" }
      dashboard: { narrow: "vertical project list, full-width cards (p-3 vs p-7); per-project actions + reorder collapse into a kebab -> BottomSheet action sheet (hover icon-cluster + HTML5 drag + hidden up/down steps are all dead on touch); touch targets >=44px", status: observed, evidence: "ActivityOverview.tsx useNarrowViewport(CAROUSEL_MAX_WIDTH), BottomSheet, ProjectActionButtons (hidden md:flex)" }
      command_palette: { narrow: "needs a TOUCH entry + w-full max-w-[calc(100vw-2rem)] (PaletteShell is 34rem fixed, keyboard-only) — it is the action fallback for the absent native menu", status: proposed, evidence: "PaletteShell.tsx w-[34rem], App.tsx Cmd+K/Cmd+Shift+P" }
      global_header: { narrow: "reflow: logo + truncated breadcrumb + ONE overflow kebab for all utilities; never a 9-icon row (useCompact at 1600 only hides labels)", status: proposed, evidence: "GlobalHeader.tsx flex justify-between, useCompact.ts" }
      hover_terminal_preview: { narrow: "DISABLED on touch/narrow (no hover; popover obscures)", status: observed, evidence: "useTerminalPreview.ts hoverPreviewEnabled()" }
      toast: { narrow: "already max-w-[calc(100vw-2rem)] — OK", status: ok, evidence: "toast.tsx" }
    navigation_touch:
      problem: "Keyboard-first nav is DEAD on touch (Cmd+K/Cmd+Shift+P palettes, Cmd+1..9, Cmd+/ hint overlay) and the native application menu is ABSENT in remote/browser mode."
      backbone: "breadcrumb spine stays the touch nav backbone (logo->dashboard, project->board, chevron->switcher, back/forward). Keep reachable (>=44px targets, right-0 dropdown fallback, not pushed off-screen by long task titles)."
      action_fallback: "command/action palette gains a TOUCH entry + responsive width on narrow; because the native menu is gone in remote, the action palette / per-object action sheets become the canonical action surface on mobile. This is the one sanctioned exception to 'palettes are keyboard-only / no button'."
      hard_rule: "NO feature may be touch-unreachable. If an action's only desktop path is a keyboard shortcut or the native menu, it MUST have a touch path on narrow (action sheet, palette, or inline control)."
    primitive_bottom_sheet:
      status: proposed
      need: "No bottom-sheet/drawer exists today (only centered Modal, confirm(), toast, Popover). ONE reusable BottomSheet is mandated."
      used_for: ["context-menu -> action sheet", "board filters", "column-jump list", "Move to <status>", "inspector actions", "diff file picker", "narrow form of action-style modals"]
      requirements: "slide from bottom; respect env(safe-area-inset-bottom); trap + restore focus; dismiss on backdrop tap / swipe-down / Esc; pure React (no native dialog — works in desktop and browser). Build once; no ad-hoc sheets."
    budgets_narrow:
      global_header: "logo + breadcrumb + 1 overflow kebab; rest into kebab/sheet"
      page_primary: "1 (FAB or header button); rest into a bottom sheet"
      inspector: "1 summary bar; all actions into the actions sheet"
      toolbar_row: "wrap or sheet — NEVER a non-wrapping overflow row"
      touch_target: ">= 44x44px (many controls are 32px / p-0.5 — bump on narrow)"
    viewport_meta: "useViewport(): browser -> device-width (so a phone reports true width and media queries fire; replaces the old fixed width=1024). Keep the .browser-mode 16px input-font rule (prevents iOS focus-zoom). Honour env(safe-area-inset-*) (viewport already sets viewport-fit=cover)."
    reusable_primitives: ["useNarrowViewport(px) reactive gate", "MobileBoardCarousel scroll-snap+pager (reference)", "TerminalView touch->mouse bridge (model for canvas surfaces)", "ExtraKeyBar vw-based sizing (mobile toolbars)", "prefersReducedMotion() (apply site-wide)", ".browser-mode CSS sentinel (env-specific styling)"]

  anti_patterns:
    - id: "full-surface-swipe-over-terminal"
      description: "Hijacking full-pane horizontal swipe to change tmux panes. The terminal runs interactive TUIs (vim/htop/less) that consume touch and horizontal motion. Pane switching must use the explicit pager (optionally thin edge-swipe gutters), not a full-surface swipe. Full-surface swipe is allowed ONLY on the board, where column bodies scroll vertically."
    - id: "touch-unreachable-feature"
      description: "An action whose only path is a keyboard shortcut (Cmd+K/Cmd+Shift+P/Cmd+1..9/hint overlay) or the native application menu. On narrow (<768) it is dead — no keyboard, and the native menu is absent in remote. Every feature needs a touch path (palette touch entry, action sheet, or inline control). See responsive.navigation_touch."
    - id: "fixed-width-overlay-on-narrow"
      description: "A Modal/palette/popover with a hardcoded w-[NNrem] and no max-w-[calc(100vw-2rem)] overflows a 390px phone (PaletteShell 34rem, TaskDetailModal 35rem, confirm() 26rem, diff aside 22rem). Overlays must clamp to the viewport on narrow."
    - id: "non-wrapping-toolbar-on-narrow"
      description: "An icon/action row (flex justify-end / justify-between, no flex-wrap) that silently overflows under 768px (GlobalHeader <=9 buttons, TaskCard footer, inspector collapsed bar). On narrow, wrap or move to a bottom sheet — never a clipped row."
    - id: "layout-gated-on-transport-not-width"
      description: "Gating a layout on isElectrobun (or only on useMobile's mount-once 1024 check) instead of the reactive useNarrowViewport. Transport != viewport width: browser/remote can be wide, desktop can be narrowed. Gate layout on useNarrowViewport; use isElectrobun/useMobile only for transport/viewport-meta."
    - id: "toolbar-button-creep"
      description: "Adding yet another always-visible git/tmux/dev-server button to TaskInfoPanel or task toolbars without checking the budget. The changelog shows a long history of this (always-visible-git-buttons, tmux-action-buttons, push-button, create-pr-button, etc.). Group or overflow instead."
    - id: "hardcoded-colors"
      description: "Using raw hex/rgb in components instead of semantic Tailwind tokens. Forbidden by AGENTS.md except STATUS_COLORS."
    - id: "untranslated-strings"
      description: "Hardcoding user-facing strings instead of using t() from useT(). All UI strings must exist in en/ru/es."
    - id: "actions-in-breadcrumbs"
      description: "Putting task/project commands into the GlobalHeader breadcrumb area, which is for location + switching only."
    - id: "debug-surface-leak"
      description: "Exposing gauge-demo / viewport-lab outside the Debug menu."

  open_questions:
    - "Is there a need for multi-select + a real selection toolbar on the Kanban board, or is per-task action intentional?"
    - "Should an --info semantic token be added, or is reusing accent (blue) for informational state intentional?"
    - "ProjectSettings (59.9K) is very large. Does it need a documented sub-surface budget or splitting? (TaskInfoPanel is now governed by surfaces.task_info_panel.bar_model.)"
    - "Status colors are hardcoded hex by design; should they migrate to named tokens for theme consistency, or stay as the documented exception?"

  resolved_questions:
    - "[2026-06-19] Where do keyboard shortcuts live / how are they shown? RESOLVED: single source of truth = src/mainview/keymap.ts (data; documents, does not dispatch — guarded by a test). One KeyboardShortcutsModal with App + Terminal(tmux) tabs, reached via Help menu + Cmd+/ + ⇧⌘P palette; same data feeds README + website. See surfaces.keyboard_shortcuts_reference + UX_DECISIONS 2026-06-19."
    - "[2026-06-18] command_palette navigation-vs-action split: RESOLVED as two-surfaces-one-shell. Cmd+K = navigation, Cmd+Shift+P = actions; both render on the shared PaletteShell. Action mode runs commands via handleMenuAction (DOM mirror of the native menu), destructive/modal flows excluded by policy. See UX_DECISIONS 2026-06-18 + surfaces.command_palette.modes."
