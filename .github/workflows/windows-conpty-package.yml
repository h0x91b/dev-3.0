name: Windows ConPTY package

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/windows-conpty-package.yml"
      - "electrobun.config.ts"
      - "package.json"
      - "scripts/fixtures/windows-conpty-package/**"
      - "scripts/build-windows-terminal-host.ts"
      - "scripts/verify-packaged-windows-conpty.ts"
      - "src/bun/native-terminal-host/**"
      - "src/shared/native-terminal-runtime.ts"
      - "src/bun/prototypes/detached-pty/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-smoke:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup build Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bundle terminal host entrypoint
        run: bun run build:native

      - name: Build and verify packaged ConPTY tracer
        shell: pwsh
        run: |
          Push-Location scripts/fixtures/windows-conpty-package
          bun ../../../node_modules/electrobun/bin/electrobun.cjs build --env=canary
          Pop-Location

      - name: Upload package and proof
        uses: actions/upload-artifact@v5
        with:
          name: windows-conpty-package
          path: |
            scripts/fixtures/windows-conpty-package/artifacts/
            scripts/fixtures/windows-conpty-package/build/**/windows-conpty-package-proof.json
