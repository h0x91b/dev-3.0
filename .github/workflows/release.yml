name: Release

# Publishing runs ONLY for v* tags. Two dry-run paths build, sign, notarize
# and gate everything identically but skip all user-visible publishing
# (S3 syncs incl. the updater feed at the bucket root, GitHub Release, brew):
#   - push a `test-*` tag (works from any branch, pre-merge)
#   - `gh workflow run release.yml --ref <branch>` (workflow_dispatch;
#     available once this file is on the default branch)
# Dry-run artifacts (DMGs etc.) are still uploaded as GitHub Actions
# artifacts on the run page.
on:
  push:
    tags: ["v*", "test-*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────
  # Determine version from tag
  # ──────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      publish: ${{ steps.version.outputs.publish }}
    steps:
      - uses: actions/checkout@v5

      - name: Determine version tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "push" ] && [[ "$TAG" == v* ]]; then
            echo "publish=true" >> $GITHUB_OUTPUT
            echo "Version tag: $TAG (publishing release)"
          else
            echo "publish=false" >> $GITHUB_OUTPUT
            echo "DRY RUN for ref '$TAG' — build/sign/verify only, nothing published"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────────
  # Build for each platform (parallel)
  # ──────────────────────────────────────────────────
  build-macos-arm64:
    needs: prepare
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Restore node_modules cache
        id: cache-deps
        uses: actions/cache/restore@v5
        with:
          path: ./node_modules
          key: bun-deps-macos-arm64-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install

      - name: Save node_modules cache
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ./node_modules
          key: bun-deps-macos-arm64-${{ hashFiles('bun.lock') }}

      - name: Import code signing certificate
        env:
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$MAC_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 -P "$MAC_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          rm $RUNNER_TEMP/certificate.p12

      - name: Enable code signing in config
        run: |
          sed -i '' 's/codesign: false/codesign: true/' electrobun.config.ts
          sed -i '' 's/notarize: false/notarize: true/' electrobun.config.ts
          echo "Patched electrobun.config.ts for signing:"
          grep -E 'codesign|notarize' electrobun.config.ts

      # Zig-built electrobun binaries (extractor/launcher/libasar) ship with
      # zero headerpad; Apple codesign silently overwrites the start of
      # __text when adding LC_CODE_SIGNATURE, producing a signed, notarized
      # binary that segfaults on launch (issue #563, ziglang/zig#23704,
      # blackboardsh/electrobun#485, decision 107). Reserve a signature slot
      # BEFORE electrobun build signs them. No-op once upstream is fixed.
      - name: Fix Mach-O headerpad in electrobun binaries
        run: |
          ARCH=$(uname -m); [ "$ARCH" = "x86_64" ] && ARCH=x64
          DIST="node_modules/electrobun/dist-macos-${ARCH}"
          if [ ! -d "$DIST" ]; then
            EBVER=$(bun -p 'require("./node_modules/electrobun/package.json").version')
            echo "dist missing before build — pre-fetching electrobun core v${EBVER}"
            curl -fsSL "https://github.com/blackboardsh/electrobun/releases/download/v${EBVER}/electrobun-core-darwin-${ARCH}.tar.gz" -o "$RUNNER_TEMP/electrobun-core.tar.gz"
            mkdir -p "$DIST"
            tar xzf "$RUNNER_TEMP/electrobun-core.tar.gz" -C "$DIST"
          fi
          bun scripts/fix-macho-headerpad.ts fix "$DIST"

      # Self-contained tmux shipped inside the app bundle and CLI tarball
      # (decisions/137). Built natively on this runner's arch; the cache makes
      # it a no-op unless the build script (pins/flags) changed.
      - name: Restore bundled tmux cache
        uses: actions/cache@v5
        with:
          path: ./vendor/bundled-tmux
          key: bundled-tmux-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-bundled-tmux.sh') }}

      - name: Build bundled tmux
        run: bash scripts/build-bundled-tmux.sh

      - name: Clean build directory
        run: rm -rf ./build ./artifacts

      - name: Build release
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
          COPYFILE_DISABLE: "1"
          COPY_EXTENDED_ATTRIBUTES_DISABLE: "1"
        run: |
          bun scripts/generate-build-info.ts
          bun scripts/generate-changelog.ts
          bunx vite build
          bun run build:cli
          bunx electrobun build --env=stable || echo "::warning::electrobun build exited with $? (recovering artifacts)"

      - name: Debug build output
        if: always()
        run: |
          echo "=== ./build/ ==="
          find ./build -maxdepth 3 -type f 2>/dev/null || echo "(empty)"
          echo "=== ./artifacts/ ==="
          ls -lhR ./artifacts/ 2>/dev/null || echo "(empty)"

      # Gate against the codesign __text clobber (issue #563): a corrupted
      # binary is fully signed and notarized yet segfaults on launch, so the
      # only reliable checks are structural (load commands vs sections) and
      # actually executing the launcher stub.
      - name: Verify signed binaries (Mach-O gate + launcher smoke run)
        run: |
          if [ -z "$(find ./build -maxdepth 2 -name '*.app' -type d)" ]; then
            echo "::error::no .app found under ./build — nothing to verify"
            exit 1
          fi
          bun scripts/fix-macho-headerpad.ts verify ./build
          PAYLOAD=$(find ./build -path "*/Contents/Resources/*.tar.zst" -type f | head -1)
          if [ -n "$PAYLOAD" ]; then
            # verify the inner app tree packed into the self-extractor payload
            command -v zstd >/dev/null || brew install --quiet zstd
            mkdir -p "$RUNNER_TEMP/eb-payload"
            zstd -d -q -f "$PAYLOAD" -o "$RUNNER_TEMP/eb-payload/app.tar"
            tar xf "$RUNNER_TEMP/eb-payload/app.tar" -C "$RUNNER_TEMP/eb-payload"
            bun scripts/fix-macho-headerpad.ts verify "$RUNNER_TEMP/eb-payload"
            # smoke-run the self-extractor stub: outside a bundle it must
            # print its banner and exit cleanly, not die of SIGSEGV
            cp "$(dirname "$(dirname "$PAYLOAD")")/MacOS/launcher" "$RUNNER_TEMP/smoke-launcher"
            # The release signature (hardened runtime) makes a bare out-of-bundle
            # exec die with SIGKILL before main() even for healthy binaries
            # (verified on the shipped v1.29.3 launcher). Re-sign ad-hoc: the
            # issue #563 corruption lives in __text and survives re-signing, so
            # the smoke run still catches it (corrupted v1.29.2 still segfaults).
            codesign --remove-signature "$RUNNER_TEMP/smoke-launcher"
            codesign -s - "$RUNNER_TEMP/smoke-launcher"
            set +e
            OUT=$(perl -e 'alarm 60; exec @ARGV' "$RUNNER_TEMP/smoke-launcher" 2>&1)
            CODE=$?
            set -e
            echo "$OUT"
            echo "launcher exit code: $CODE"
            if [ "$CODE" -ge 128 ]; then
              echo "::error::launcher died with a signal (exit $CODE) — Mach-O corruption? (issue #563)"
              exit 1
            fi
            if ! echo "$OUT" | grep -q "Electrobun self-extractor"; then
              echo "::error::launcher did not print the self-extractor banner"
              exit 1
            fi
            # Bundled tmux gate (decisions/137): the app payload must carry a
            # signed, self-contained tmux that can run a real session with a
            # sanitized PATH — i.e. on a machine with NO system/brew tmux.
            TMUX_BIN=$(find "$RUNNER_TEMP/eb-payload" -path "*/Contents/Resources/app/tmux/tmux" -type f | head -1)
            if [ -z "$TMUX_BIN" ]; then
              echo "::error::bundled tmux missing from the app payload (Resources/app/tmux/tmux)"
              exit 1
            fi
            codesign --verify --strict "$TMUX_BIN"
            if otool -L "$TMUX_BIN" | grep -Eq "/opt/homebrew|/usr/local"; then
              echo "::error::bundled tmux links non-system libraries:"
              otool -L "$TMUX_BIN"
              exit 1
            fi
            SMOKE_HOME=$(mktemp -d)
            SANITIZED=(env -i HOME="$SMOKE_HOME" PATH="/usr/bin:/bin:/usr/sbin:/sbin" TERM=xterm-256color)
            "${SANITIZED[@]}" "$TMUX_BIN" -V
            "${SANITIZED[@]}" "$TMUX_BIN" -S "$SMOKE_HOME/smoke.sock" -f /dev/null new-session -d -s smoke
            "${SANITIZED[@]}" "$TMUX_BIN" -S "$SMOKE_HOME/smoke.sock" list-sessions | grep -q "^smoke:"
            "${SANITIZED[@]}" "$TMUX_BIN" -S "$SMOKE_HOME/smoke.sock" kill-server || true
            LICENSES_DIR="$(dirname "$TMUX_BIN")/licenses"
            for lic in tmux libevent utf8proc; do
              if [ ! -s "$LICENSES_DIR/$lic.LICENSE" ]; then
                echo "::error::bundled tmux is missing the $lic license notice"
                exit 1
              fi
            done
            echo "bundled tmux gate OK: $TMUX_BIN"
          else
            echo "::warning::no self-extractor payload (*.tar.zst) found — inner binaries and launcher not smoke-tested"
          fi

      - name: Create release artifacts
        run: bash ./scripts/create-release-artifacts.sh macos arm64

      - name: Create CLI tarball
        run: bash ./scripts/create-cli-tarball.sh macos arm64

      - name: Upload artifacts to S3
        if: needs.prepare.outputs.publish == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          aws s3 sync "./artifacts-macos-arm64/" "s3://h0x91b-releases/dev-3.0/$TAG/"
          aws s3 sync "./artifacts-macos-arm64/" "s3://h0x91b-releases/dev-3.0/" \
            --exclude "*.dmg" --exclude "*Setup*.tar.gz" --exclude "dev3-cli-*.tar.gz"

      - name: Upload artifacts for release job
        uses: actions/upload-artifact@v5
        with:
          name: artifacts-macos-arm64
          path: ./artifacts-macos-arm64/

