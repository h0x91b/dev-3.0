          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          aws s3 sync "./artifacts-linux-x64/" "s3://h0x91b-releases/dev-3.0/$TAG/"
          aws s3 sync "./artifacts-linux-x64/" "s3://h0x91b-releases/dev-3.0/" \
            --exclude "*.dmg" --exclude "*Setup*.tar.gz" --exclude "dev3-cli-*.tar.gz"

      - name: Upload artifacts for release job
        uses: actions/upload-artifact@v5
        with:
          name: artifacts-linux-x64
          path: ./artifacts-linux-x64/

  build-linux-arm64:
    needs: prepare
    runs-on: ubuntu-22.04-arm
    # Best-effort: arm64 is a newer target and the Electrobun desktop bundle for
    # linux-arm64 is not yet proven, so this job must NEVER block a release of the
    # established x64 / macOS platforms. The CLI tarball (`bun build --compile`)
    # is arch-portable and reliable; the GUI bundle step is allowed to fail
    # without taking the job (or the release) down. Drop continue-on-error once
    # arm64 has shipped cleanly a few times.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Restore node_modules cache
        id: cache-deps
        uses: actions/cache/restore@v5
        with:
          path: ./node_modules
          key: bun-deps-linux-arm64-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install

      - name: Save node_modules cache
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ./node_modules
          key: bun-deps-linux-arm64-${{ hashFiles('bun.lock') }}

      - name: Clean build directory
        run: rm -rf ./build ./artifacts

      - name: Build release
        env:
          COPYFILE_DISABLE: "1"
          COPY_EXTENDED_ATTRIBUTES_DISABLE: "1"
        run: |
          bun scripts/generate-build-info.ts
          bun scripts/generate-changelog.ts
          bunx vite build
          bun run build:cli
          bunx electrobun build --env=stable || echo "::warning::electrobun build exited with $? (recovering artifacts)"

      - name: Debug build output
        if: always()
        run: |
          echo "=== ./build/ ==="
          find ./build -maxdepth 3 -type f 2>/dev/null || echo "(empty)"
          echo "=== ./artifacts/ ==="
          ls -lhR ./artifacts/ 2>/dev/null || echo "(empty)"

      # Reliable artifact FIRST: the compiled CLI is just `bun build --compile`
      # for the host arch, no Electrobun runtime involved. This guarantees the
      # arm64 CLI tarball (brew + `dev3 remote`) ships even if the GUI bundle
      # below can't be produced yet.
      - name: Create CLI tarball
        run: bash ./scripts/create-cli-tarball.sh linux arm64

      # Best-effort GUI bundle: depends on Electrobun shipping linux-arm64 runtime
      # binaries. If that's not available yet, don't fail the job — the CLI tarball
      # is already staged and the release notes/formula simply omit the arm64 GUI.
      - name: Create release artifacts (GUI bundle, best-effort)
        continue-on-error: true
        run: |
          bash ./scripts/create-release-artifacts.sh linux arm64 \
            || echo "::warning::linux-arm64 GUI bundle not produced (Electrobun arm64 runtime may be unavailable) — shipping the CLI tarball only"

      - name: Upload artifacts to S3
        if: needs.prepare.outputs.publish == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          aws s3 sync "./artifacts-linux-arm64/" "s3://h0x91b-releases/dev-3.0/$TAG/"
          aws s3 sync "./artifacts-linux-arm64/" "s3://h0x91b-releases/dev-3.0/" \
            --exclude "*.dmg" --exclude "*Setup*.tar.gz" --exclude "dev3-cli-*.tar.gz"

      - name: Upload artifacts for release job
        uses: actions/upload-artifact@v5
        with:
          name: artifacts-linux-arm64
          path: ./artifacts-linux-arm64/

  # ──────────────────────────────────────────────────
  # Create GitHub Release (aggregates all platforms)
  # ──────────────────────────────────────────────────
  release:
    needs: [prepare, build-macos-arm64, build-macos-x64, build-linux-x64, build-linux-arm64]
    if: needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: all-artifacts
          merge-multiple: true

      - name: List collected artifacts
        run: ls -lhR all-artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          S3_BASE="https://h0x91b-releases.s3.eu-west-1.amazonaws.com/dev-3.0/$TAG"

          {
            echo "## Download"
            echo ""

            # macOS Apple Silicon
            if ls all-artifacts/*macos-arm64*.dmg 1>/dev/null 2>&1; then
              echo "### macOS (Apple Silicon)"
              echo "- [\`stable-macos-arm64-dev-3.0.dmg\`]($S3_BASE/stable-macos-arm64-dev-3.0.dmg)"
              echo ""
            fi

            # macOS Intel
            if ls all-artifacts/*macos-x64*.dmg 1>/dev/null 2>&1; then
              echo "### macOS (Intel)"
              echo "- [\`stable-macos-x64-dev-3.0.dmg\`]($S3_BASE/stable-macos-x64-dev-3.0.dmg)"
              echo ""
            fi

            # Linux (x64)
            if ls all-artifacts/*linux-x64*.tar.zst 1>/dev/null 2>&1; then
              echo "### Linux (x64)"
              echo "- [\`stable-linux-x64-dev-3.0.tar.zst\`]($S3_BASE/stable-linux-x64-dev-3.0.tar.zst)"
              echo ""
            fi

            # Linux (arm64) — best-effort; the GUI bundle may be absent until the
            # Electrobun arm64 runtime ships, but the CLI tarball still publishes.
            if ls all-artifacts/*linux-arm64*.tar.zst 1>/dev/null 2>&1; then
              echo "### Linux (arm64)"
              echo "- [\`stable-linux-arm64-dev-3.0.tar.zst\`]($S3_BASE/stable-linux-arm64-dev-3.0.tar.zst)"
              echo ""
            fi

            echo "### All artifacts"
            echo ""
            for file in all-artifacts/*; do
              [ -f "$file" ] || continue
              name=$(basename "$file")
              echo "- [\`$name\`]($S3_BASE/$name)"
            done
          } > /tmp/release-notes.md

          echo "=== Release notes ==="
          cat /tmp/release-notes.md

          # Create or update the release
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release $TAG exists, updating..."
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --notes-file /tmp/release-notes.md
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md
          fi

      - name: Upload DMGs to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          for dmg in all-artifacts/*.dmg; do
            [ -f "$dmg" ] || continue
            echo "Uploading $(basename "$dmg") to release $TAG"
            gh release upload "$TAG" "$dmg" --repo "${{ github.repository }}" --clobber
          done

      - name: Upload CLI tarballs to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          for tarball in all-artifacts/dev3-cli-*.tar.gz; do
            [ -f "$tarball" ] || continue
            echo "Uploading $(basename "$tarball") to release $TAG"
            gh release upload "$TAG" "$tarball" --repo "${{ github.repository }}" --clobber
          done

      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${TAG#v}"
          DMG_PATH="all-artifacts/stable-macos-arm64-dev-3.0.dmg"

          if [ ! -f "$DMG_PATH" ]; then
            echo "::warning::ARM64 DMG not found, skipping Homebrew update"
            exit 0
          fi

          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          echo "Updating Homebrew Cask: version=${VERSION} sha256=${SHA256}"

          rm -rf /tmp/homebrew-dev3
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/h0x91b/homebrew-dev3.git" /tmp/homebrew-dev3
          mkdir -p /tmp/homebrew-dev3/Casks

          # Regenerate the full cask each release (instead of sed-ing
          # version/sha256). This keeps `depends_on` and other metadata under
          # version control in this repo's release.yml — single source of truth.
          cat > /tmp/homebrew-dev3/Casks/dev3.rb <<EOF
          cask "dev3" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/h0x91b/dev-3.0/releases/download/v#{version}/stable-macos-arm64-dev-3.0.dmg"
            name "dev-3.0"
            desc "Terminal-centric project manager for AI coding agents"
            homepage "https://h0x91b.github.io/dev-3.0/"

            # The app updates itself via the in-app updater, so most installs
            # drift ahead of the Caskroom-recorded version. Without this flag a
            # bulk \`brew upgrade\` tries to "upgrade" such installs and can rip
            # the bundle from under a running instance (or die mid-move on the
            # stale Caskroom state). auto_updates makes bulk \`brew upgrade\`
            # skip dev3; an explicit \`brew upgrade --cask dev3\` still works.
            auto_updates true
            depends_on arch: :arm64
            depends_on macos: :ventura
            depends_on formula: "git"
            # No tmux dependency: the app bundle ships its own self-contained
            # pinned tmux (Resources/app/tmux) — see decisions/137. Existing
            # installs with the h0x91b/dev3/tmux@3.6 keg keep working (the keg
            # is the second resolution tier after the bundled binary).
            depends_on formula: "cloudflared"

            app "dev-3.0.app"

            zap trash: [
              "~/Library/Application Support/dev3.electrobun.dev",
              "~/Library/Caches/dev3.electrobun.dev",
              "~/Library/Preferences/dev3.electrobun.dev.plist",
            ]
          end
          EOF

          cd /tmp/homebrew-dev3
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/dev3.rb
          if git diff --cached --quiet; then
            echo "Homebrew Cask already up to date (no changes)"
            exit 0
          fi
          git commit -m "Update dev3 to ${VERSION}"
          git push origin main

      - name: Update Homebrew Formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${TAG#v}"
          S3_BASE="https://h0x91b-releases.s3.eu-west-1.amazonaws.com/dev-3.0/$TAG"

          MACOS_ARM64="all-artifacts/dev3-cli-macos-arm64.tar.gz"
          MACOS_X64="all-artifacts/dev3-cli-macos-x64.tar.gz"
          LINUX_X64="all-artifacts/dev3-cli-linux-x64.tar.gz"
          LINUX_ARM64="all-artifacts/dev3-cli-linux-arm64.tar.gz"

          # linux-arm64 is NOT in the hard requirement below — it's a best-effort
          # platform, so a missing arm64 tarball must not block the x64/macOS
          # formula update. It's added to the formula conditionally further down.
          if [ ! -f "$LINUX_X64" ] || [ ! -f "$MACOS_ARM64" ] || [ ! -f "$MACOS_X64" ]; then
            echo "::warning::CLI tarballs missing for one or more platforms — skipping Formula update"
            ls -lh all-artifacts/dev3-cli-*.tar.gz 2>/dev/null || echo "(none)"
            exit 0
          fi

          MACOS_ARM64_SHA=$(shasum -a 256 "$MACOS_ARM64" | awk '{print $1}')
          MACOS_X64_SHA=$(shasum -a 256 "$MACOS_X64" | awk '{print $1}')
          LINUX_X64_SHA=$(shasum -a 256 "$LINUX_X64" | awk '{print $1}')
          echo "Formula sha256: macos-arm64=$MACOS_ARM64_SHA macos-x64=$MACOS_X64_SHA linux-x64=$LINUX_X64_SHA"

          # Conditionally add the linux-arm64 bottle. Built with first-line indent
          # bare (the heredoc placeholder supplies it) and 6-space body indent so it
          # nests correctly under `on_linux do`. Empty when the arm64 tarball wasn't
          # produced, which collapses to a harmless blank line in the formula.
          LINUX_ARM_BLOCK=""
          if [ -f "$LINUX_ARM64" ]; then
            LINUX_ARM64_SHA=$(shasum -a 256 "$LINUX_ARM64" | awk '{print $1}')
            echo "Formula includes linux-arm64: sha256=$LINUX_ARM64_SHA"
            LINUX_ARM_BLOCK=$(printf 'on_arm do\n        url "%s/dev3-cli-linux-arm64.tar.gz"\n        sha256 "%s"\n      end' "$S3_BASE" "$LINUX_ARM64_SHA")
          else
            echo "::warning::linux-arm64 CLI tarball missing — Formula will omit the Linux arm64 bottle"
          fi

          rm -rf /tmp/homebrew-dev3
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/h0x91b/homebrew-dev3.git" /tmp/homebrew-dev3
          mkdir -p /tmp/homebrew-dev3/Formula

          cat > /tmp/homebrew-dev3/Formula/dev3.rb <<EOF
          class Dev3 < Formula
            desc "Terminal-centric project manager for AI coding agents (CLI + headless)"
            homepage "https://h0x91b.github.io/dev-3.0/"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "${S3_BASE}/dev3-cli-macos-arm64.tar.gz"
                sha256 "${MACOS_ARM64_SHA}"
              end
              on_intel do
                url "${S3_BASE}/dev3-cli-macos-x64.tar.gz"
                sha256 "${MACOS_X64_SHA}"
              end
            end

            on_linux do
              on_intel do
                url "${S3_BASE}/dev3-cli-linux-x64.tar.gz"
                sha256 "${LINUX_X64_SHA}"
              end
              ${LINUX_ARM_BLOCK}
            end

            # No tmux dependency on macOS: the tarball ships a self-contained
            # pinned tmux next to the binary (decisions/137). Linux tarballs
            # don't carry it yet, so Linux keeps the pinned keg — without it a
            # fresh Linux install on a tmux-less box would have no tmux at all.
            on_linux do
              depends_on "h0x91b/dev3/tmux@3.6"
            end
            depends_on "git"
            depends_on "cloudflared"

            def install
              libexec.install "dev3", "dist"
              chmod 0755, libexec/"dev3"
              # Bundled self-contained tmux (macOS tarballs only). The app
              # resolves it at libexec/tmux/tmux — next to the real binary,
              # same layout as the extracted tarball.
              if File.exist?("tmux")
                libexec.install "tmux"
                chmod 0755, libexec/"tmux/tmux"
              end
              # \`dev3\` is a single binary that is both the CLI and the headless
              # server (\`dev3 remote\` boots the server in-process). It serves the
              # UI from the sibling \`dist/\` resolved via realpath(execPath), so it
              # finds itself next to the real binary in libexec.
              bin.install_symlink libexec/"dev3"
            end

            test do
              assert_match "dev3", shell_output("#{bin}/dev3 --version")
            end
          end
          EOF

          cd /tmp/homebrew-dev3
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dev3.rb
          if git diff --cached --quiet; then
            echo "Homebrew Formula already up to date (no changes)"
            exit 0
          fi
          git commit -m "Update dev3 formula to ${VERSION}"
          git push origin main
