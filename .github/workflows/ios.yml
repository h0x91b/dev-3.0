name: iOS

on:
  pull_request:
    paths:
      - "ios/**"
      - "src/mainview/index.css"
      - "src/mainview/TerminalView.tsx"
      - "src/shared/types.ts"
      - ".github/workflows/ios.yml"
  push:
    branches:
      - main
    paths:
      - "ios/**"
      - "src/mainview/index.css"
      - "src/mainview/TerminalView.tsx"
      - "src/shared/types.ts"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build and test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install native tooling
        run: brew install xcodegen swiftformat swiftlint

      - name: Verify generated assets
        run: |
          bun test ios/scripts/*.test.ts
          bun ios/scripts/gen-theme.ts --check

      - name: Verify formatting
        working-directory: ios
        run: swiftformat --lint .

      - name: Verify lint rules
        working-directory: ios
        run: swiftlint lint --strict --config .swiftlint.yml

      - name: Test Swift packages
        working-directory: ios
        run: |
          for package in Packages/Dev3Kit Packages/Dev3TerminalKit Packages/Dev3UI; do
            swift test --package-path "$package"
          done

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Select iOS Simulator
        id: simulator
        working-directory: ios
        run: echo "udid=$(./scripts/select-test-simulator.sh)" >> "$GITHUB_OUTPUT"

      - name: Test iOS app
        working-directory: ios
        run: |
          xcodebuild \
            -project Dev3.xcodeproj \
            -scheme Dev3 \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}' \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Build iOS Simulator app
        working-directory: ios
        run: |
          xcodebuild \
            -project Dev3.xcodeproj \
            -scheme Dev3 \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
