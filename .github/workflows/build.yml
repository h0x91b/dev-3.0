name: Build

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Restore node_modules cache
        id: cache-deps
        uses: actions/cache/restore@v4
        with:
          path: ./node_modules
          key: bun-deps-linux-x64-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install

      - name: Save node_modules cache
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./node_modules
          key: bun-deps-linux-x64-${{ hashFiles('bun.lock') }}

      - name: Generate build files
        run: bun scripts/generate-build-info.ts && bun scripts/generate-changelog.ts

      - name: Type check
        run: bun run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Restore node_modules cache
        id: cache-deps
        uses: actions/cache/restore@v4
        with:
          path: ./node_modules
          key: bun-deps-linux-x64-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install

      - name: Save node_modules cache
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./node_modules
          key: bun-deps-linux-x64-${{ hashFiles('bun.lock') }}

      - name: Generate build files
        run: bun scripts/generate-build-info.ts && bun scripts/generate-changelog.ts

      - name: Run tests
        run: bun run test:full

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Restore node_modules cache
        id: cache-deps
        uses: actions/cache/restore@v4
        with:
          path: ./node_modules
          key: bun-deps-linux-x64-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install

      - name: Save node_modules cache
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./node_modules
          key: bun-deps-linux-x64-${{ hashFiles('bun.lock') }}

      - name: Generate build files
        run: bun scripts/generate-build-info.ts && bun scripts/generate-changelog.ts

      - name: Build check
        run: bunx vite build && bun run build:cli

  trivy-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-results.txt'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'
          trivy-config: ''
        env:
          TRIVY_INCLUDE_DEV_DEPS: 'true'
        continue-on-error: true

      - name: Post Trivy results to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔍 Trivy Vulnerability Scan\n\n';
            if (fs.existsSync('trivy-results.txt')) {
              const results = fs.readFileSync('trivy-results.txt', 'utf8').trim();
              if (results.length === 0) {
                body += '✅ No vulnerabilities found.\n';
              } else {
                const lines = results
                  .split('\n')
                  .map((line) => line.trim())
                  .filter(Boolean);
                const tableLines = lines.filter((line) => line.startsWith('│'));
                const legendIndex = lines.findIndex((line) => line === 'Legend:');

                if (tableLines.length >= 2) {
                  const parseRow = (line) =>
                    line
                      .split('│')
                      .slice(1, -1)
                      .map((cell) => cell.trim());

                  const header = parseRow(tableLines[0]);
                  const rows = tableLines.slice(1).map(parseRow);

                  body += '### Report Summary\n\n';
                  body += `| ${header.join(' | ')} |\n`;
                  body += `| ${header.map(() => '---').join(' | ')} |\n`;
                  body += rows.map((row) => `| ${row.join(' | ')} |`).join('\n');
                  body += '\n';

                  if (legendIndex !== -1) {
                    const legendLines = lines
                      .slice(legendIndex + 1)
                      .filter((line) => line.startsWith('-'));
                    if (legendLines.length > 0) {
                      body += '\n';
                      body += legendLines.join('\n');
                      body += '\n';
                    }
                  }
                } else {
                  body += '### Raw Output\n\n';
                  body += '```\n' + results + '\n```\n';
                }
              }
            } else {
              body += '⚠️ Trivy results file not found.\n';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const trivyComment = comments.find((comment) =>
              comment.body.includes('Trivy Vulnerability Scan'),
            );
            if (trivyComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: trivyComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        continue-on-error: true
