name: Build

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Generate build files
        run: bun scripts/generate-build-info.ts && bun scripts/generate-changelog.ts

      - name: Type check
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Build check
        run: bunx vite build
